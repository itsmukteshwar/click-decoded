<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0D1B2A; color: #e2e8f0; padding: 20px; font-size: 13px; }
  h1 { font-size: 18px; font-weight: 800; color: #F59E0B; margin-bottom: 4px; letter-spacing: .5px; }
  .subtitle { color: #64748b; font-size: 12px; margin-bottom: 16px; }
  .legend { display: flex; gap: 20px; margin-bottom: 18px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #94a3b8; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-g { background: #22c55e; }
  .dot-r { background: #ef4444; }
  .dot-y { background: #f59e0b; }

  .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

  .nav-item { background: #1a2e4a; border-radius: 10px; overflow: hidden; border: 1px solid #2d4a7a; }
  .nav-head { padding: 10px 14px; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .nav-head .label { display: flex; align-items: center; gap: 8px; }
  .nav-head .icon { font-size: 16px; }
  .nav-head .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .badge-new { background: rgba(239,68,68,.2); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
  .badge-ok  { background: rgba(34,197,94,.15); color: #22c55e; border: 1px solid rgba(34,197,94,.2); }
  .badge-partial { background: rgba(245,158,11,.15); color: #f59e0b; border: 1px solid rgba(245,158,11,.2); }
  .chevron { color: #64748b; font-size: 12px; transition: transform .2s; }
  .nav-item.open .chevron { transform: rotate(180deg); }

  .nav-body { display: none; padding: 6px 0 10px; }
  .nav-item.open .nav-body { display: block; }

  .group-label { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 1px; padding: 8px 14px 4px; }
  .sub-item { display: flex; align-items: center; gap: 8px; padding: 5px 14px; font-size: 12px; color: #cbd5e1; }
  .sub-item .si-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .si-exists { background: #22c55e; }
  .si-new    { background: #ef4444; }
  .si-partial{ background: #f59e0b; }
  .sub-item .si-url { font-size: 10px; color: #475569; margin-left: auto; font-family: monospace; }
  .sub-item .si-tag { font-size: 9px; padding: 1px 6px; border-radius: 10px; margin-left: 4px; flex-shrink: 0; }
  .tag-new { background: rgba(239,68,68,.15); color: #f87171; }
  .tag-phase2 { background: rgba(100,116,139,.15); color: #94a3b8; }

  /* color per section */
  .h-seo    { background: linear-gradient(90deg,#0f3460,#1a2e4a); border-bottom: 2px solid #2563eb; }
  .h-paid   { background: linear-gradient(90deg,#2d1a0e,#1a2e4a); border-bottom: 2px solid #f59e0b; }
  .h-ai     { background: linear-gradient(90deg,#0d2d2d,#1a2e4a); border-bottom: 2px solid #06b6d4; }
  .h-geo    { background: linear-gradient(90deg,#1a0d3a,#1a2e4a); border-bottom: 2px solid #8b5cf6; }
  .h-content{ background: linear-gradient(90deg,#1a2d0d,#1a2e4a); border-bottom: 2px solid #22c55e; }
  .h-web    { background: linear-gradient(90deg,#1a1a0d,#1a2e4a); border-bottom: 2px solid #eab308; }
  .h-ind    { background: linear-gradient(90deg,#2d0d1a,#1a2e4a); border-bottom: 2px solid #ec4899; }
  .h-wl     { background: linear-gradient(90deg,#0d2d1a,#1a2e4a); border-bottom: 2px solid #10b981; }
  .h-co     { background: linear-gradient(90deg,#1e1a0d,#1a2e4a); border-bottom: 2px solid #d97706; }

  .summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 16px; }
  .sum-card { background: #1a2e4a; border-radius: 8px; padding: 12px 14px; border: 1px solid #2d4a7a; }
  .sum-num { font-size: 28px; font-weight: 900; margin-bottom: 2px; }
  .sum-lbl { font-size: 11px; color: #64748b; }
  .num-g { color: #22c55e; }
  .num-r { color: #ef4444; }
  .num-y { color: #f59e0b; }

  .note { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2); border-radius: 8px; padding: 10px 14px; margin-top: 14px; font-size: 12px; color: #fbbf24; line-height: 1.6; }
</style>
</head>

const statusClass = { exists:'si-exists', new:'si-new', phase2:'si-partial' };
const statusDot   = { exists:'exists', new:'new', phase2:'phase2' };

function countItems(nav) {
  let exists=0, newp=0, phase2=0;
  nav.forEach(n => n.groups.forEach(g => g.items.forEach(i => {
    if(i.status==='exists') exists++;
    else if(i.status==='new') newp++;
    else phase2++;
  })));
  return { exists, new: newp, phase2 };
}

const badgeCls = { ok:'badge-ok', new:'badge-new', partial:'badge-partial' };
const badgeTxt = { ok:'All built', new:'All new', partial:'Needs pages' };

const grid = document.getElementById('navGrid');
navData.forEach((n,i) => {
  const el = document.createElement('div');
  el.className = 'nav-item';
  el.dataset.id = n.id;

  const bodyHtml = n.groups.map(g => `
    <div class="group-label">${g.label}</div>
    ${g.items.map(it => `
      <div class="sub-item">
        <div class="si-dot ${statusClass[it.status]}"></div>
        <span>${it.name}</span>
        ${it.status==='new' ? '<span class="si-tag tag-new">BUILD</span>' : ''}
        ${it.status==='phase2' ? '<span class="si-tag tag-phase2">PHASE 2</span>' : ''}
        <span class="si-url">${it.url}</span>
      </div>`).join('')}
  `).join('');

  el.innerHTML = `
    <div class="nav-head ${n.headClass}">
      <div class="label">
        <span class="icon">${n.icon}</span>
        <span>${n.label}</span>
        <span class="badge ${badgeCls[n.badge]}">${badgeTxt[n.badge]}</span>
      </div>
      <span class="chevron">▼</span>
    </div>
    <div class="nav-body">${bodyHtml}</div>
  `;
  el.querySelector('.nav-head').addEventListener('click', () => {
    el.classList.toggle('open');
  });
  grid.appendChild(el);
});

// Open first 3 by default
document.querySelectorAll('.nav-item').forEach((el,i) => {
  if(i < 2) el.classList.add('open');
});

// Summary
const counts = countItems(navData);
const sumEl = document.getElementById('summary');
sumEl.innerHTML = `
  <div class="sum-card"><div class="sum-num num-g">${counts.exists}</div><div class="sum-lbl">Pages already exist</div></div>

`;

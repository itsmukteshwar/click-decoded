  <!-- CLICK text -->
  <text x="112" y="58" font-family="Inter,Arial,sans-serif" font-weight="900" font-size="42" fill="#ffffff" letter-spacing="-1">CLICK</text>
  <!-- DECODED text -->
  <text x="112" y="88" font-family="Inter,Arial,sans-serif" font-weight="700" font-size="26" fill="#F59E0B" letter-spacing="4">DECODED</text>
</svg>
